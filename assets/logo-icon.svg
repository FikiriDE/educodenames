    <rect x="107" y="87"  width="46" height="46" rx="8" fill="#d1495b"/>
    <rect x="162" y="87"  width="46" height="46" rx="8" fill="#3f8ecb"/>
    <rect x="217" y="87"  width="46" height="46" rx="8" fill="#cbb994"/>

    <rect x="107" y="142" width="46" height="46" rx="8" fill="#3f8ecb"/>
    <rect x="162" y="142" width="46" height="46" rx="8" fill="#cbb994"/>
    <rect x="217" y="142" width="46" height="46" rx="8" fill="#d1495b"/>

    <rect x="107" y="197" width="46" height="46" rx="8" fill="#cbb994"/>
    <rect x="162" y="197" width="46" height="46" rx="8" fill="#d1495b"/>
    <rect x="217" y="197" width="46" height="46" rx="8" fill="#3f8ecb"/>
  </g>

  <!-- magnifying glass -->
  <circle cx="185" cy="165" r="110" fill="none" stroke="#1f2a33" stroke-width="22"/>
  <line x1="262.8" y1="242.8" x2="330" y2="310" stroke="#1f2a33" stroke-width="24" stroke-linecap="round"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <clipPath id="lens-clip">
      <circle cx="185" cy="165" r="95"/>
    </clipPath>
  </defs>

  <!-- card grid, clipped to the lens -->
